<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="loadDashboard()">

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>MyApp</h2>
    <ul>
      <li onclick="showPage('dashboard')">Dashboard</li>
      <li onclick="showPage('profile')">Profile</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <h2 id="welcome"></h2>

    <!-- Dashboard Section -->
    <div id="dashboardPage">

      <div id="adminPanel" class="card">
        <h3>Admin Panel</h3>
        <p>Total Users: 120</p>
        <p>Revenue: $5000</p>
      </div>

      <div id="userPanel" class="card">
        <h3>User Panel</h3>
        <p>Your Activity: Active</p>
      </div>

    </div>

    <!-- Profile Section -->
    <div id="profilePage" style="display:none;">
      <div class="card">
        <h3>Profile</h3>
        <p>Name: Demo User</p>
        <p>Role: <span id="roleText"></span></p>
      </div>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
